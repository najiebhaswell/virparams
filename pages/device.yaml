# =============================================
# MULTI-TAB DEVICE PAGE
# Tabs: Summary | WAN | WLAN | Admin
# =============================================

# =============================================
# TAB 1: SUMMARY
# =============================================
- label: "'Summary'"
  route: "'summary'"
  components:
    - type: "'tags'"
    - type: "'ping'"
    - type: "'device-actions'"
    - type: "'parameter-list'"
      parameters:
        - element: "'span.inform'"
          label: "'Status'"
          type: "'container'"
          components:
            - chart: "'online'"
              type: "'overview-dot'"
        - label: "'Registered to ACS'"
          parameter: Events.Registered
        - element: "'span.inform'"
          label: "'Last inform'"
          parameter: DATE_STRING(Events.Inform)
        - element: "'span.inform'"
          label: "'Device'"
          type: "'container'"
          components:
            - parameter: DeviceID.OUI
              type: "'parameter'"
            - parameter: DeviceID.Manufacturer
              type: "'parameter'"
            - parameter: DeviceID.ProductClass
              type: "'parameter'"
        - label: "'Hardware version'"
          parameter: COALESCE(InternetGatewayDevice.DeviceInfo.HardwareVersion, Device.DeviceInfo.HardwareVersion)
        - label: "'Software version'"
          parameter: COALESCE(InternetGatewayDevice.DeviceInfo.SoftwareVersion, Device.DeviceInfo.SoftwareVersion)
        - label: "'Serial number'"
          parameter: DeviceID.SerialNumber
        - label: "'Access Type'"
          parameter: VirtualParameters.AccessType
        - label: "'Device Uptime'"
          parameter: VirtualParameters.DeviceUptime
        - element: "'span.inform'"
          label: "'Rx Power'"
          parameter: DATE_STRING(Events.Inform)
          type: "'container'"
          components:
            - parameter: VirtualParameters.OpticalRXPower
              type: "'parameter'"
            - chart: "'optical-rx-power'"
              type: "'overview-dot'"
        - element: "'span.inform'"
          label: "'Optical Temperature'"
          parameter: DATE_STRING(Events.Inform)
          type: "'container'"
          components:
            - parameter: VirtualParameters.OpticalTemperature
              type: "'parameter'"
            - chart: "'optical-temperature'"
              type: "'overview-dot'"
    - type: "'container'"
      components:
        - chart: "'online-short'"
          type: "'overview-dot'"
        - type: "'summon-button'"
          parameters:
            - InternetGatewayDevice.DeviceInfo.HardwareVersion
            - InternetGatewayDevice.DeviceInfo.SoftwareVersion
            - Device.DeviceInfo.HardwareVersion
            - Device.DeviceInfo.SoftwareVersion
            - VirtualParameters.OpticalRXPower
            - VirtualParameters.OpticalTemperature
            - VirtualParameters.DeviceUptime
            - VirtualParameters.KnownManufacturer
            - VirtualParameters.KnownProductClass
            - VirtualParameters.AccessType
            - InternetGatewayDevice.WANDevice.1.WANCommonInterfaceConfig.WANAccessType
            - VirtualParameters.IP-TR069
            - VirtualParameters.IP-WANIP
            - VirtualParameters.IP-WANPPP
            - VirtualParameters.WANBridge
            - VirtualParameters.TotalStations
            - VirtualParameters.SSID1-Name
            - VirtualParameters.SSID1-Password
            - VirtualParameters.SSID1-Security
            - VirtualParameters.SSID5-Name
            - VirtualParameters.SSID5-Password
            - VirtualParameters.DNSServers
            - VirtualParameters.DHCPLeaseTime
            - VirtualParameters.FirewallLevel
            - InternetGatewayDevice.WANDevice.1.WANConnectionNumberOfEntries
            - VirtualParameters.PPPUsername
            - VirtualParameters.LoginSuperUser
            - VirtualParameters.LoginSuperPass
    - type: "'parameter-list'"
      parameters:
        - label: "'Total WAN'"
          parameter: InternetGatewayDevice.WANDevice.1.WANConnectionNumberOfEntries
        - label: "'WAN Bridge'"
          parameter: VirtualParameters.WANBridge
        - label: "'PPP Username'"
          parameter: VirtualParameters.PPPUsername
        - label: "'DNS Servers'"
          parameter: VirtualParameters.DNSServers
        - label: "'Firewall Level'"
          parameter: VirtualParameters.FirewallLevel
        - label: "'DHCP Lease Time'"
          parameter: VirtualParameters.DHCPLeaseTime
        - label: "'Superadmin User'"
          parameter: VirtualParameters.LoginSuperUser
        - label: "'Superadmin Pass'"
          parameter: VirtualParameters.LoginSuperPass
        - label: "'IP TR069'"
          parameter: VirtualParameters.IP-TR069
          type: "'container'"
          components:
            type: VirtualParameters.IP-TR069
          element:
            tag: "'a'"
            attributes:
              href: "'http://' || VirtualParameters.IP-TR069"
              target: "'_blank'"
        - label: "'IP WAN IP'"
          parameter: VirtualParameters.IP-WANIP
          type: "'container'"
          components:
            type: VirtualParameters.IP-WANIP
          element:
            tag: "'a'"
            attributes:
              href: "'http://' || VirtualParameters.IP-WANIP"
              target: "'_blank'"
        - label: "'IP WAN PPP'"
          parameter: VirtualParameters.IP-WANPPP
          type: "'container'"
          components:
            type: VirtualParameters.IP-WANPPP
          element:
            tag: "'a'"
            attributes:
              href: "'http://' || VirtualParameters.IP-WANPPP"
              target: "'_blank'"
        - label: "'SSID1 Name'"
          parameter: VirtualParameters.SSID1-Name
        - label: "'SSID1 Password'"
          parameter: VirtualParameters.SSID1-Password
        - label: "'SSID1 Security'"
          parameter: VirtualParameters.SSID1-Security
        - label: "'SSID5 Name (5GHz)'"
          parameter: VirtualParameters.SSID5-Name
        - label: "'SSID5 Password (5GHz)'"
          parameter: VirtualParameters.SSID5-Password
        - label: "'Total Stations'"
          parameter: VirtualParameters.TotalStations
    - element: "'div'"
      type: "'container'"
      components:
        - element: "'h3'"
          type: "'container'"
          components:
            - "'Faults'"
            - type: "'device-faults'"

